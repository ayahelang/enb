<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Experiment</title>
    <meta name="description" id="metaDesc" />
    <meta name="keywords" id="metaKeywords" />
    <script type="application/ld+json" id="schema"></script>
  </head>

  <body>
    <header>
      <a href="index.html">← Back</a>
    </header>
    <div class="article">
      <h1 id="title"></h1>
      <div id="video"></div>
      <p id="content"></p>
      <div id="related"></div>
    </div>
    <script>
      async function loadArticle() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        const res = await fetch("data/experiments.json");
        const data = await res.json();

        const exp = data.find((e) => e.id === id);

        document.getElementById("title").innerText = exp.title;

        document.getElementById("content").innerText =
          exp.article || generateArticle(exp);

        document.getElementById("video").innerHTML =
          `<iframe src="${exp.video}" width="100%" height="400"></iframe>`;

        // ✅ SEO (dipindah ke sini)
        document.title = exp.title;
        document
          .getElementById("metaDesc")
          .setAttribute("content", exp.description);
        document
          .getElementById("metaKeywords")
          .setAttribute("content", exp.keywords);

        // ✅ related
        showRelated(data, id);
        // const schema = {
        //   "@context": "https://schema.org",
        //   "@type": "Article",
        //   headline: exp.title,
        //   description: exp.description,
        //   image: exp.image,
        //   author: {
        //     "@type": "Organization",
        //     name: "EnB Tech Lab",
        //   },
        //   publisher: {
        //     "@type": "Organization",
        //     name: "EnB Tech Lab",
        //   },
        //   datePublished: exp.date,
        // };
        const schema = {
          "@context": "https://schema.org",
          "@type": "VideoObject",
          name: exp.title,
          description: exp.description,
          thumbnailUrl: exp.image,
          uploadDate: exp.date,
          embedUrl: exp.video,
        };

        document.getElementById("schema").textContent = JSON.stringify(schema);
      }

      loadArticle();

      // document
      //   .getElementById("metaDesc")
      //   .setAttribute("content", exp.description);
      // document
      //   .getElementById("metaKeywords")
      //   .setAttribute("content", exp.keywords);
      // document.getElementById("ogTitle").setAttribute("content", exp.title);
      // document
      //   .getElementById("ogDesc")
      //   .setAttribute("content", exp.description);
      function showRelated(data, currentId) {
        const related = data.filter((e) => e.id !== currentId).slice(0, 3);
        const container = document.getElementById("related");
        container.innerHTML = "<h3>Related Experiments</h3>";
        related.forEach((r) => {
          container.innerHTML += `<a href="article.html?id=${r.id}">
          ${r.title}</a><br>`;
        });
      }

      function generateArticle(exp) {
        return `${exp.title}
        Eksperimen ini membahas: ${exp.description}
        Simak video di atas untuk hasil lengkap.`;
      }
    </script>
  </body>
</html>
